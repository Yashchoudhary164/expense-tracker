<!DOCTYPE html>
<html>
<head>
    <title>Edit Expense</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
    <div class="card p-4 shadow">
        <h2>Edit Expense</h2>

        <form method="post">
            {% csrf_token %}
            <input type="text" name="title" value="{{ expense.title }}" class="form-control mb-3">
            <input type="number" name="amount" value="{{ expense.amount }}" class="form-control mb-3">
            <input type="text" name="category" value="{{ expense.category }}" class="form-control mb-3">
            <button class="btn btn-primary">Update</button>
        </form>
    </div>
</div>

</body>
</html>
