<!DOCTYPE html>
<html>
<head>
    <title>Add Expense</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
    <div class="card p-4 shadow">
        <h2>Add Expense</h2>

        <form method="post">
            {% csrf_token %}
            <input type="text" name="title" class="form-control mb-3" placeholder="Title">
            <input type="number" name="amount" class="form-control mb-3" placeholder="Amount">
            <input type="text" name="category" class="form-control mb-3" placeholder="Category">
            <button class="btn btn-success">Save</button>
        </form>
    </div>
</div>

</body>
</html>
