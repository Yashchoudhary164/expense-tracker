{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    <!-- CSS -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5">

    <!-- HEADER -->
    <div class="d-flex justify-content-between align-items-center">

        <h2>💰 Expense Tracker</h2>

        <!-- Buttons Section -->
        <div class="d-flex gap-2">

            <!-- 🌙 DARK MODE BUTTON (FIXED) -->
            <button type="button" onclick="toggleDarkMode()" id="themeBtn" class="btn btn-dark">
                🌙
            </button>

            <!-- 🔴 LOGOUT BUTTON -->
            <form action="{% url 'logout' %}" method="post">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger">
                    Logout
                </button>
            </form>

        </div>
    </div>

    <!-- TOTAL CARD -->
    <div class="card mt-4 p-3 shadow">
        <h4>Total Expense</h4>
        <h2>₹{{ total }}</h2>
    </div>

    <!-- ADD BUTTON -->
    <a href="{% url 'add_expense' %}" class="btn btn-primary mt-3">
        + Add Expense
    </a>

    <!-- EXPENSE LIST -->
    <ul class="list-group mt-4">
        {% for exp in expenses %}
        <li class="list-group-item d-flex justify-content-between align-items-center">

            <span>{{ exp.title }} ({{ exp.category }})</span>

            <div>
                <strong class="me-3">₹{{ exp.amount }}</strong>

                <a href="{% url 'edit_expense' exp.id %}" class="btn btn-warning btn-sm me-1">
                    Edit
                </a>

                <a href="{% url 'delete_expense' exp.id %}" class="btn btn-danger btn-sm">
                    Delete
                </a>
            </div>

        </li>
        {% empty %}
        <li class="list-group-item text-center">No expenses yet</li>
        {% endfor %}
    </ul>

    <!-- CHART -->
    <canvas id="chart" class="mt-4"></canvas>

</div>

<!-- CHART JS -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
const data = {
    labels: [{% for exp in expenses %}'{{ exp.category }}',{% endfor %}],
    datasets: [{
        label: 'Expenses',
        data: [{% for exp in expenses %}{{ exp.amount }},{% endfor %}],
    }]
};

new Chart(document.getElementById('chart'), {
    type: 'pie',
    data: data
});
</script>

<!-- 🌙 DARK MODE SCRIPT -->
<script>
function toggleDarkMode() {
    document.body.classList.toggle("dark-mode");

    let btn = document.getElementById("themeBtn");

    if (document.body.classList.contains("dark-mode")) {
        localStorage.setItem("theme", "dark");
        btn.innerHTML = "☀️";
    } else {
        localStorage.setItem("theme", "light");
        btn.innerHTML = "🌙";
    }
}

// Load saved theme
window.onload = function () {
    let btn = document.getElementById("themeBtn");

    if (localStorage.getItem("theme") === "dark") {
        document.body.classList.add("dark-mode");
        btn.innerHTML = "☀️";
    }
}
</script>

</body>
</html>
